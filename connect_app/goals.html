<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Goal Setting</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script>
    // Add goal
    function addGoal() {
      const input = document.getElementById("goalInput");
      const goalText = input.value.trim();
      if (goalText === "") return;

      const li = document.createElement("li");
      li.className = "flex justify-between items-center bg-gray-100 p-3 rounded-md";

      const span = document.createElement("span");
      span.className = "text-gray-800 font-medium";
      span.textContent = goalText;

      const button = document.createElement("button");
      button.className = "text-red-500 hover:text-red-700";
      button.textContent = "Delete";
      button.onclick = () => li.remove();

      li.appendChild(span);
      li.appendChild(button);

      document.getElementById("goalList").appendChild(li);
      input.value = "";
    }

    // Delete goal
    function deleteGoal(button) {
      button.parentElement.remove();
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
  <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">🎯 Goal Setting</h1>

    <!-- Input Section -->
    <div class="flex space-x-2 mb-4">
      <input
        type="text"
        id="goalInput"
        placeholder="Enter a new goal..."
        class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400"
      />
      <button
        onclick="addGoal()"
        class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition"
      >
        Add Goal
      </button>
    </div>

    <!-- Goal List -->
    <ul id="goalList" class="space-y-3">
      <li class="flex justify-between items-center bg-gray-100 p-3 rounded-md">
        <span class="text-gray-800 font-medium">Improve communication skills</span>
        <button class="text-red-500 hover:text-red-700" onclick="deleteGoal(this)">Delete</button>
      </li>
      <li class="flex justify-between items-center bg-gray-100 p-3 rounded-md">
        <span class="text-gray-800 font-medium">Enhance attention span for tasks</span>
        <button class="text-red-500 hover:text-red-700" onclick="deleteGoal(this)">Delete</button>
      </li>
      <li class="flex justify-between items-center bg-gray-100 p-3 rounded-md">
        <span class="text-gray-800 font-medium">Improve fine motor skills through daily activities</span>
        <button class="text-red-500 hover:text-red-700" onclick="deleteGoal(this)">Delete</button>
      </li>
      <li class="flex justify-between items-center bg-gray-100 p-3 rounded-md">
        <span class="text-gray-800 font-medium">Develop basic social interaction (e.g., greeting peers)</span>
        <button class="text-red-500 hover:text-red-700" onclick="deleteGoal(this)">Delete</button>
      </li>
    </ul>
  </div>
</body>
</html>
